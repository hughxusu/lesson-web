<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    
    .center {
      width: 1000px;
      margin: 0 auto;
    }

    .box {
      height: 40px;
      border-top: 3px solid #ff8500;
      border-bottom: 1px solid #edeef0;
      margin: 0 auto;
    }

    .box a {
      display: inline-block;
      width: 80px;
      height: 40px;
      color: #4c4c4c;
      text-decoration: none;
      text-align: center;
      line-height: 40px;
      font-size: 12px;
    }

    .box a:hover {
      background-color: #edeef0;
      color: #ff8400;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="center">
      <a href="#">设为首页</a><a href="#">手机新浪网</a><a href="#">移动用户端</a>
    </div>
  </div>
</body>
</html>
